services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       pramana_audit
      POSTGRES_USER:     pramana
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - pramana-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pramana -d pramana_audit"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    environment:
      - PRAMANA_API_KEY=${PRAMANA_API_KEY:-}
      - PRAMANA_PRIVATE_KEY=${PRAMANA_PRIVATE_KEY:-}
      - PRAMANA_PUBLIC_KEY=${PRAMANA_PUBLIC_KEY:-}
      - PORT=${PORT:-3000}
      - HOST=${HOST:-0.0.0.0}
      - AUDIT_DATABASE_URL=postgresql://pramana:${POSTGRES_PASSWORD:-changeme}@postgres:5432/pramana_audit
      - CORS_ORIGIN=http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pramana-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  dashboard:
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pramana-net

networks:
  pramana-net:
    driver: bridge

volumes:
  postgres_data:
