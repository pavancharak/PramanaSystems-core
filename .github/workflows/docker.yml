name: Docker

on:
  push:
    branches:
      - main

# Only one Docker build runs at a time on main; the newer push wins.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GHCR requires lowercase image names; github.repository may contain uppercase.
      - name: Lowercase repository name
        run: |
          echo "IMAGE_REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_REPO }}/server:latest
            ghcr.io/${{ env.IMAGE_REPO }}/server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push dashboard image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/dashboard/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_REPO }}/dashboard:latest
            ghcr.io/${{ env.IMAGE_REPO }}/dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
