name: Governance CI

on:
  push:
    branches:
      - "**"

  pull_request:

jobs:
  governance-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build workspace packages
        run: npm run build

      # Enforces deterministic governance invariants,
      # replay-safe execution guarantees,
      # portable verification semantics,
      # and conformance validation.
      - name: Run deterministic governance validation
        run: npm run check



