name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

# Cancel in-progress runs on the same ref when a newer push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build & Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build workspace packages
        run: npm run build

      - name: Generate dev keys for tests
        run: |
          mkdir -p dev-keys
          node -e "
            const { generateKeyPairSync } = require('crypto');
            const { privateKey, publicKey } = generateKeyPairSync('ed25519', {
              privateKeyEncoding: { type: 'pkcs8', format: 'pem' },
              publicKeyEncoding: { type: 'spki', format: 'pem' }
            });
            require('fs').writeFileSync('dev-keys/bundle_signing_key', privateKey);
            require('fs').writeFileSync('dev-keys/bundle_signing_key.pub', publicKey);
          "

      - name: Run full check suite
        run: npm run check
