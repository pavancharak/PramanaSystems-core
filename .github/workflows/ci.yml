name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

# Cancel in-progress runs on the same ref when a newer push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build & Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build workspace packages
        run: npm run build

      - name: Restore dev keys from secrets
        env:
          BUNDLE_SIGNING_KEY: ${{ secrets.BUNDLE_SIGNING_KEY }}
          BUNDLE_SIGNING_KEY_PUB: ${{ secrets.BUNDLE_SIGNING_KEY_PUB }}
        run: |
          mkdir -p dev-keys
          echo "$BUNDLE_SIGNING_KEY" > dev-keys/bundle_signing_key
          echo "$BUNDLE_SIGNING_KEY_PUB" > dev-keys/bundle_signing_key.pub

      - name: Run full check suite
        run: npm run check
