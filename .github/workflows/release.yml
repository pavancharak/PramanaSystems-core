name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Validate & Publish
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # registry-url writes //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}
      # into .npmrc so every subsequent npm publish picks it up.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Restore dev keys from secrets
        env:
          BUNDLE_SIGNING_KEY: ${{ secrets.BUNDLE_SIGNING_KEY }}
          BUNDLE_SIGNING_KEY_PUB: ${{ secrets.BUNDLE_SIGNING_KEY_PUB }}
        run: |
          mkdir -p dev-keys
          echo "$BUNDLE_SIGNING_KEY" > dev-keys/bundle_signing_key
          echo "$BUNDLE_SIGNING_KEY_PUB" > dev-keys/bundle_signing_key.pub

      # release:validate runs: build → check → pack:packages →
      # release:manifest → release:attest → release:reproducibility →
      # consumer integration test. All gates must pass before publish.
      - name: Release validation
        run: npm run release:validate
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publish in dependency order: lower-level packages first so that
      # dependents resolve against the freshly published versions.
      - name: Publish @pramanasystems/bundle
        run: npm publish --workspace=packages/bundle --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @pramanasystems/crypto
        run: npm publish --workspace=packages/crypto --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @pramanasystems/governance
        run: npm publish --workspace=packages/governance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @pramanasystems/execution
        run: npm publish --workspace=packages/execution --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @pramanasystems/verifier
        run: npm publish --workspace=packages/verifier --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @pramanasystems/core
        run: npm publish --workspace=packages/core --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @pramanasystems/verifier-cli
        run: npm publish --workspace=packages/verifier-cli --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @pramanasystems/server
        run: npm publish --workspace=packages/server --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @pramanasystems/sdk-client
        run: npm publish --workspace=packages/sdk-client --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
